version: "3.9"

# =====================================================================
# News Analytics Stack
# - Elasticsearch 8.x: full-text search (Kịch bản 1)
# - Kibana: GUI để browse/debug ES
# - ClickHouse: time-series analytics (Kịch bản 2)
# =====================================================================

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: news-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # disable auth cho dev — bật lại khi production
      - ES_JAVA_OPTS=-Xms1g -Xmx1g     # giới hạn heap 1GB (tăng nếu máy khoẻ)
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - news-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: news-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - news-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: news-ch
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    environment:
      - CLICKHOUSE_DB=news
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - news-net

volumes:
  es_data:
  ch_data:
  ch_logs:

networks:
  news-net:
    driver: bridge
