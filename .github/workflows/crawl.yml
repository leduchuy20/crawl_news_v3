name: Daily News Crawl

on:
  schedule:
    # 10:00 giờ Việt Nam = 03:00 UTC (UTC+7)
    # Lưu ý: GitHub Actions cron là best-effort, có thể trễ 5-60 phút
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date YYYY-MM-DD (rỗng = 7 ngày trước)"
        required: false
        default: ""

# Không còn push data về git -> chỉ cần đọc code.
permissions:
  contents: read

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5h — chừa thời gian cho NER lần đầu (~4h với full dataset)

    env:
      PYTHONIOENCODING: utf-8
      # Dataset lưu trên Hugging Face thay vì git (tránh repo phình to).
      # ĐỔI 'huyleduc' thành username Hugging Face thật của bạn nếu khác.
      HF_REPO_ID: ledhuy/crawl_news_vn
      HF_PRIVATE: "1"
      HF_TOKEN: ${{ secrets.CRAWL_NEWS_VN }}

    steps:
      - name: Checkout (code only, shallow)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "huggingface_hub>=0.24"

      # Tải state cũ từ HF về data/ TRƯỚC khi chạy pipeline.
      # Bắt buộc để: NER incremental skip ID đã NER, crawler resume + dedup
      # qua checkpoint_*.json. Lần chạy đầu (repo HF chưa có) sẽ bỏ qua an toàn.
      - name: Pull dataset state from Hugging Face
        run: python hf_sync.py pull

      - name: Run crawler pipeline
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            python run_all.py --start "${{ github.event.inputs.start_date }}"
          else
            python run_all.py
          fi

      # Đẩy state mới (articles_ner* + checkpoint_*) lên HF.
      - name: Push dataset to Hugging Face
        if: always()  # vẫn push state đã crawl được kể cả khi pipeline lỗi giữa chừng
        run: python hf_sync.py push -m "daily crawl $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Upload logs (artifact, 7 ngày)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs-${{ github.run_id }}
          path: data/*.log
          retention-days: 7
